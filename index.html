<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روابط الأدوات والفيديوهات</title>
    <style>
        /* إعدادات الخلفية والخط */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #4e54c8 100%);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding-top: 40px;
        }

        /* تنسيق الصورة الشخصية */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            font-size: 22px;
            margin: 10px 0;
            letter-spacing: 0.5px;
        }

        .bio {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        /* تنسيق قائمة الروابط */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* تنسيق الزرار */
        .btn {
            display: flex;
            align-items: center;
            justify-content: flex-start; /* يبدأ من اليمين بسبب dir=rtl */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        /* صورة/أيقونة داخل الزرار */
        .btn img {
            width: 30px;
            height: 30px;
            margin-left: 15px; /* مسافة بين الأيقونة والنص */
            border-radius: 5px;
        }

        /* تأثير الحركة عند التمرير بالماوس */
        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* تأثير عند الضغط */
        .btn:active {
            transform: scale(0.98);
        }

        /* تذييل الصفحة */
        footer {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="WhatsApp Image 2026-04-15 at 3.26.12 PM.jpeg" alt="صورة البروفايل" class="profile-img">
        
        <h1>عبد الله أحمد</h1>
        <p class="bio">محتوى تقني</p>

        <div class="links-container">

            <a href="https://uptoz.com/1732?hpub=ga_abdo_glitch" target="_blank" class="btn">
           تطبيق التأكد من صحة الحديث النبوي      </a>

            <a href="https://uptoz.com/518?hpub=ga_abdo_glitch" target="_blank" class="btn">
               اداة الصور الذكية!!
            </a>

        </div>

        <footer>
            تم التصميم بواسطة عبدالله &copy; 2026
        </footer>
    </div>

</body>
</html>
